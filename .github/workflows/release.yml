name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            archive: tar.gz
            include_echocatcher: true

          - name: linux-arm64
            goos: linux
            goarch: arm64
            archive: tar.gz
            include_echocatcher: true

          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            archive: tar.gz
            include_echocatcher: true

          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            archive: tar.gz
            include_echocatcher: true

          - name: windows-amd64
            goos: windows
            goarch: amd64
            archive: zip
            include_echocatcher: false

          - name: android-arm64
            goos: linux
            goarch: arm64
            archive: tar.gz
            include_echocatcher: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build scattergun
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY=scattergun
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY=scattergun.exe
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/$BINARY" ./scattergun/

      - name: Build echocatcher
        if: ${{ matrix.include_echocatcher }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o "dist/echocatcher" ./echocatcher/

      - name: Package (tar.gz)
        if: ${{ matrix.archive == 'tar.gz' }}
        run: |
          ARCHIVE_NAME="scattergun-${{ matrix.name }}.tar.gz"
          if [ "${{ matrix.name }}" = "android-arm64" ]; then
            ARCHIVE_NAME="scattergun-android-arm64.tar.gz"
          fi
          tar -czf "$ARCHIVE_NAME" -C dist .
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Package (zip)
        if: ${{ matrix.archive == 'zip' }}
        run: |
          ARCHIVE_NAME="scattergun-${{ matrix.name }}.zip"
          cd dist && zip "../$ARCHIVE_NAME" ./*
          cd ..
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
